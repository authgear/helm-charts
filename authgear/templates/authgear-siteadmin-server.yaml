{{- if .Values.authgear.siteadminServer.enabled }}
{{- $siteadminPortalName := include "authgear.nameSiteadminPortal" . }}
{{- $siteadminExternalURL := .Values.authgear.siteadminPortal.externalURL }}
{{- if not $siteadminExternalURL }}
{{- $siteadminExternalURL = printf "https://%s" (include "authgear.siteadminHost" .) }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "authgear.nameSiteadmin" . | quote }}
  labels:
    {{- include "authgear.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.authgear.siteadminServer.replicas }}
  selector:
    matchLabels:
      {{- include "authgear.siteadminSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "authgear.siteadminSelectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.authgear.siteadminServer.nodeSelector }}
      nodeSelector:
        {{- .Values.authgear.siteadminServer.nodeSelector | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.authgear.siteadminServer.nodeName }}
      nodeName: {{ .Values.authgear.siteadminServer.nodeName | quote }}
      {{- end }}
      {{- if .Values.authgear.siteadminServer.affinity }}
      affinity:
        {{- .Values.authgear.siteadminServer.affinity | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.authgear.siteadminServer.tolerations }}
      tolerations:
      {{- .Values.authgear.siteadminServer.tolerations | toYaml | nindent 6 }}
      {{- end }}
      {{- if .Values.authgear.siteadminServer.topologySpreadConstraints }}
      topologySpreadConstraints:
      {{- .Values.authgear.siteadminServer.topologySpreadConstraints | toYaml | nindent 6 }}
      {{- end }}
      {{- if .Values.authgear.appCustomResources.path }}
      volumes:
      - name: app-custom-resources
        {{- toYaml .Values.authgear.appCustomResources.volume | nindent 8 }}
      {{- end }}
      containers:
      - name: authgear-siteadmin-server
        image: {{ .Values.authgear.portalServer.image | quote }}
        imagePullPolicy: Always
        args: ["authgear-portal", "start", "siteadmin"]
        {{- if .Values.authgear.appCustomResources.path }}
        volumeMounts:
        - name: app-custom-resources
          mountPath: {{ .Values.authgear.appCustomResources.path | quote }}
        {{- end }}
        env:
        - name: DATABASE_URL
          value: {{ .Values.authgear.databaseURL | quote }}
        - name: DATABASE_SCHEMA
          value: {{ .Values.authgear.databaseSchema | quote }}
        - name: REDIS_URL
          value: {{ .Values.authgear.redisURL | quote }}
        - name: AUDIT_DATABASE_URL
          value: {{ .Values.authgear.auditLog.databaseURL | quote }}
        - name: AUDIT_DATABASE_SCHEMA
          value: {{ .Values.authgear.auditLog.databaseSchema | quote }}
        - name: TRUST_PROXY
          value: {{ .Values.authgear.trustProxy | quote }}
        - name: SENTRY_DSN
          value: {{ .Values.authgear.sentryDSN | quote }}
        - name: CONFIG_SOURCE_TYPE
          value: {{ .Values.authgear.configSourceType | quote }}
        - name: APP_CUSTOM_RESOURCE_DIRECTORY
          value: {{ .Values.authgear.appCustomResources.path | quote }}
        - name: CONFIG_SOURCE_KUBE_NAMESPACE
          value: {{ .Values.authgear.appNamespace | quote }}
        - name: SITEADMIN_AUTHGEAR_APP_ID
          value: {{ .Values.authgear.siteadminServer.authgear.appID | quote }}
        - name: SITEADMIN_AUTHGEAR_CLIENT_ID
          value: {{ .Values.authgear.siteadminServer.authgear.clientID | quote }}
        - name: SITEADMIN_AUTHGEAR_ENDPOINT
          value: {{ .Values.authgear.siteadminServer.authgear.endpoint | quote }}
        - name: SITEADMIN_AUTHGEAR_WEB_SDK_SESSION_TYPE
          value: {{ .Values.authgear.siteadminServer.authgear.webSDKSessionType | quote }}
        - name: CORS_ALLOWED_ORIGINS
          value: {{ .Values.authgear.siteadminServer.corsAllowedOrigins | quote }}
        - name: ADMIN_API_ENDPOINT
          value: {{ .Values.authgear.portalServer.adminAPI.endpoint | quote }}
        - name: APP_HOST_SUFFIX
          value: {{ printf ".%s" .Values.authgear.defaultDomain | quote }}
        {{- include "authgear.loggingEnv" . | nindent 8 }}
        {{- range $key, $val := .Values.authgear.siteadminServer.env }}
        - name: {{ $key | quote }}
          value: {{ $val | quote }}
        {{- end }}
        ports:
        - name: siteadmin
          containerPort: 3005
          protocol: TCP
        livenessProbe:
          {{- toYaml .Values.authgear.siteadminServer.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.authgear.siteadminServer.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.authgear.siteadminServer.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "authgear.nameSiteadmin" . | quote }}
  labels:
    {{- include "authgear.labels" . | nindent 4 }}
spec:
  ports:
  - port: 80
    targetPort: siteadmin
    protocol: TCP
    name: http
  selector:
    {{- include "authgear.siteadminSelectorLabels" . | nindent 4 }}
{{- if .Values.authgear.siteadminServer.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "authgear.nameSiteadmin" . | quote }}
spec:
  selector:
    matchLabels:
      {{- include "authgear.siteadminSelectorLabels" . | nindent 6 }}
  {{- if .Values.authgear.siteadminServer.pdb.unhealthyPodEvictionPolicy }}
  unhealthyPodEvictionPolicy: {{ .Values.authgear.siteadminServer.pdb.unhealthyPodEvictionPolicy | quote }}
  {{- end }}
  {{- if .Values.authgear.siteadminServer.pdb.minAvailable }}
  minAvailable: {{ .Values.authgear.siteadminServer.pdb.minAvailable }}
  {{- else if .Values.authgear.siteadminServer.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.authgear.siteadminServer.pdb.maxUnavailable }}
  {{- else }}
  {{ fail ".Values.authgear.siteadminServer.pdb has invalid configuration" }}
  {{- end }}
{{- end }}
{{- if .Values.authgear.siteadminServer.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "authgear.nameSiteadmin" . | quote }}
spec:
  minReplicas: {{ .Values.authgear.siteadminServer.replicas }}
  maxReplicas: {{ .Values.authgear.siteadminServer.hpa.maxReplicas }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "authgear.nameSiteadmin" . | quote }}
  metrics:
    {{- toYaml .Values.authgear.siteadminServer.hpa.metrics | nindent 4 }}
{{- end }}
{{- if .Values.authgear.siteadminPortal.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $siteadminPortalName | quote }}
  labels:
    {{- include "authgear.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.authgear.siteadminPortal.replicas }}
  selector:
    matchLabels:
      {{- include "authgear.siteadminPortalSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "authgear.siteadminPortalSelectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.authgear.siteadminPortal.nodeSelector }}
      nodeSelector:
        {{- .Values.authgear.siteadminPortal.nodeSelector | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.authgear.siteadminPortal.nodeName }}
      nodeName: {{ .Values.authgear.siteadminPortal.nodeName | quote }}
      {{- end }}
      {{- if .Values.authgear.siteadminPortal.affinity }}
      affinity:
        {{- .Values.authgear.siteadminPortal.affinity | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.authgear.siteadminPortal.tolerations }}
      tolerations:
      {{- .Values.authgear.siteadminPortal.tolerations | toYaml | nindent 6 }}
      {{- end }}
      {{- if .Values.authgear.siteadminPortal.topologySpreadConstraints }}
      topologySpreadConstraints:
      {{- .Values.authgear.siteadminPortal.topologySpreadConstraints | toYaml | nindent 6 }}
      {{- end }}
      containers:
      - name: authgear-siteadmin-portal
        image: {{ .Values.authgear.siteadminPortal.image | quote }}
        imagePullPolicy: Always
        env:
        - name: VITE_AUTHGEAR_ENDPOINT
          value: {{ .Values.authgear.siteadminServer.authgear.endpoint | quote }}
        - name: VITE_AUTHGEAR_CLIENT_ID
          value: {{ .Values.authgear.siteadminServer.authgear.clientID | quote }}
        - name: VITE_AUTHGEAR_REDIRECT_URL
          value: {{ printf "%s/auth-redirect" $siteadminExternalURL | quote }}
        - name: VITE_PORTAL_URL
          value: {{ include "authgear.portalHost" . | quote }}
        - name: VITE_SITEADMIN_API_URL
          value: {{ $siteadminExternalURL | quote }}
        {{- range $key, $val := .Values.authgear.siteadminPortal.env }}
        - name: {{ $key | quote }}
          value: {{ $val | quote }}
        {{- end }}
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        livenessProbe:
          {{- toYaml .Values.authgear.siteadminPortal.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.authgear.siteadminPortal.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.authgear.siteadminPortal.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $siteadminPortalName | quote }}
  labels:
    {{- include "authgear.labels" . | nindent 4 }}
spec:
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "authgear.siteadminPortalSelectorLabels" . | nindent 4 }}
{{- if .Values.authgear.siteadminPortal.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $siteadminPortalName | quote }}
spec:
  selector:
    matchLabels:
      {{- include "authgear.siteadminPortalSelectorLabels" . | nindent 6 }}
  {{- if .Values.authgear.siteadminPortal.pdb.unhealthyPodEvictionPolicy }}
  unhealthyPodEvictionPolicy: {{ .Values.authgear.siteadminPortal.pdb.unhealthyPodEvictionPolicy | quote }}
  {{- end }}
  {{- if .Values.authgear.siteadminPortal.pdb.minAvailable }}
  minAvailable: {{ .Values.authgear.siteadminPortal.pdb.minAvailable }}
  {{- else if .Values.authgear.siteadminPortal.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.authgear.siteadminPortal.pdb.maxUnavailable }}
  {{- else }}
  {{ fail ".Values.authgear.siteadminPortal.pdb has invalid configuration" }}
  {{- end }}
{{- end }}
{{- if .Values.authgear.siteadminPortal.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $siteadminPortalName | quote }}
spec:
  minReplicas: {{ .Values.authgear.siteadminPortal.replicas }}
  maxReplicas: {{ .Values.authgear.siteadminPortal.hpa.maxReplicas }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $siteadminPortalName | quote }}
  metrics:
    {{- toYaml .Values.authgear.siteadminPortal.hpa.metrics | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
